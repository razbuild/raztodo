name: Docker Build & Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6.0.2

    - name: Docker Setup Buildx
      uses: docker/setup-buildx-action@v4.0.0

    - name: Build Docker image
      run: docker build -t raztodo:test .

    - name: Test Docker container
      run: |
        mkdir -p ./raztodo-data
        docker run --rm -v $PWD/raztodo-data:/data raztodo:test add "CI test task"
        docker run --rm -v $PWD/raztodo-data:/data raztodo:test list
        ls ./raztodo-data